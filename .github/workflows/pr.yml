name: PR

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check formatting
        id: format-check
        run: bun run format:check

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.format-check.outcome == 'failure' && 'Code formatting issues detected. Please run `bun run format` to fix them.' || '' }}
          message: ${{ steps.format-check.outcome == 'success' && 'Code formatting is correct.' || '' }}
          message-icon: ✅

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Lint
        id: lint
        run: bun run lint --format=github

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.lint.outcome == 'failure' && 'Linting issues detected. Please run `bun run lint` to fix them.' || '' }}
          message: ${{ steps.lint.outcome == 'success' && 'Linting is correct.' || '' }}
          message-icon: ✅

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build
        id: build
        run: bun run build

      - name: Check for uncommitted changes
        id: check-changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git status
            exit 1
          fi

      - name: Run PR Beacon (build)
        if: failure() && steps.build.outcome == 'failure'
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: Build failed. Please check the build logs for details.

      - name: Run PR Beacon (dist)
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.check-changes.outcome == 'failure' && 'Build output is not up to date. Please run `bun run build` and commit the changes.' || '' }}
          message: ${{ steps.check-changes.outcome == 'success' && 'Build output is up to date.' || '' }}
          message-icon: ✅

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Type check
        id: type-check
        run: bun run type-check

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.type-check.outcome == 'failure' && 'Type checking failed. Please check the type-check logs for details.' || '' }}
          message: ${{ steps.type-check.outcome == 'success' && 'Type checking passed.' || '' }}
          message-icon: ✅
