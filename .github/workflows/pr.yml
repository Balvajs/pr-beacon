name: PR

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check formatting
        id: format-check
        run: bun run format:check

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.format-check.outcome == 'failure' && 'Code formatting issues detected. Please run `bun run format` to fix them.' || '' }}
          message: ${{ steps.format-check.outcome == 'success' && 'Format' || '' }}
          message-icon: ✅

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Lint
        id: lint
        run: bun run lint --format=github

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.lint.outcome == 'failure' && 'Linting issues detected. Please run `bun run lint` to fix them.' || '' }}
          message: ${{ steps.lint.outcome == 'success' && 'Lint' || '' }}
          message-icon: ✅

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build
        id: build
        run: bun run build

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20.0.4
        id: verify-changed-files
        with:
          separator: ','
          fail-if-changed: true

      - name: Run PR Beacon (build)
        if: failure() && steps.build.outcome == 'failure'
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: Build failed. Please check the build logs for details.

      - name: Build dist fail message
        id: dist-fail-message
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
        run: |
          IFS=',' read -ra FILES <<< "$CHANGED_FILES"
          LIST_ITEMS=""
          for file in "${FILES[@]}"; do
            LIST_ITEMS="${LIST_ITEMS}<li>${file}</li>"
          done
          MESSAGE="<details><summary>Build output is not up to date. Please run \`bun run build\` and commit the changes.</summary><ul>${LIST_ITEMS}</ul></details>"
          {
            echo 'message<<EOF'
            echo "$MESSAGE"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Run PR Beacon (dist)
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.verify-changed-files.outputs.files_changed == 'true' && steps.dist-fail-message.outputs.message || '' }}
          message: ${{ steps.verify-changed-files.outputs.files_changed == 'false' && 'Build' || '' }}
          message-icon: ✅
          fail-on-fail-message: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Type check
        id: type-check
        run: bun run type-check

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.type-check.outcome == 'failure' && 'Type checking failed. Please check the type-check logs for details.' || '' }}
          message: ${{ steps.type-check.outcome == 'success' && 'Type-check' || '' }}
          message-icon: ✅

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Get merge base
        id: merge-base
        run: echo "sha=$(git merge-base HEAD origin/main)" >> "$GITHUB_OUTPUT"

      - name: Get coverage baseline run ID
        id: baseline-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow main.yml \
            --commit "${{ steps.merge-base.outputs.sha }}" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download baseline coverage for merge base
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.baseline-run.outputs.id }}
          name: coverage-baseline
          path: ${{ github.workspace }}/coverage-baseline

      - name: Report coverage
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run .github/scripts/compare-coverage.ts
