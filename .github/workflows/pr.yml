name: PR

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check formatting
        id: format-check
        run: bun run format:check

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.format-check.outcome == 'failure' && 'Code formatting issues detected. Please run `bun run format` to fix them.' || '' }}
          message: ${{ steps.format-check.outcome == 'success' && 'Code formatting is correct.' || '' }}
          message-icon: ✅

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Lint
        id: lint
        run: bun run lint --format=github

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.lint.outcome == 'failure' && 'Linting issues detected. Please run `bun run lint` to fix them.' || '' }}
          message: ${{ steps.lint.outcome == 'success' && 'Linting is correct.' || '' }}
          message-icon: ✅

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build
        id: build
        run: bun run build

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20.0.4
        id: verify-changed-files
        with:
          separator: ","

      - name: Run PR Beacon (build)
        if: failure() && steps.build.outcome == 'failure'
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: Build failed. Please check the build logs for details.

      - name: Build dist fail message
        id: dist-fail-message
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
        run: |
          IFS=',' read -ra FILES <<< "$CHANGED_FILES"
          LIST_ITEMS=""
          for file in "${FILES[@]}"; do
            LIST_ITEMS="${LIST_ITEMS}<li>${file}</li>"
          done
          MESSAGE="<details><summary>Build output is not up to date. Please run \`bun run build\` and commit the changes.</summary><ul>${LIST_ITEMS}</ul></details>"
          {
            echo 'message<<EOF'
            echo "$MESSAGE"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Run PR Beacon (dist)
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.verify-changed-files.outputs.files_changed == 'true' && steps.dist-fail-message.outputs.message || '' }}
          message: ${{ steps.verify-changed-files.outputs.files_changed == 'false' && 'Build output is up to date.' || '' }}
          message-icon: ✅
          fail-on-fail-message: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Type check
        id: type-check
        run: bun run type-check

      - name: Run PR Beacon
        if: always()
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: ${{ steps.type-check.outcome == 'failure' && 'Type checking failed. Please check the type-check logs for details.' || '' }}
          message: ${{ steps.type-check.outcome == 'success' && 'Type checking passed.' || '' }}
          message-icon: ✅
